spring.application.name=olx-scrapper

# Server configuration
server.port=8080

# Logging
logging.level.root=INFO
logging.level.edu.ntu.tolstoi.olx_scrapper=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Thymeleaf
spring.thymeleaf.cache=false

# Scraper configuration
scraper.default-pages=1
scraper.user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36
scraper.timeout-ms=10000
scraper.base-url=https://www.olx.ua/uk/transport/legkovye-avtomobili/
